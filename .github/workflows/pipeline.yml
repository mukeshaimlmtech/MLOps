name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

# -------------------------------------------------
# Global environment variables
# -------------------------------------------------
env:
  DATASET_REPO: Mukeshaimlmtech2010/Wellness-Tourism-Dataset
  MODEL_REPO: Mukeshaimlmtech2010/Wellness-Tourism-Model
  SPACE_REPO: Mukeshaimlmtech2010/Wellness-Tourism-Predictor

# -------------------------------------------------
# Jobs
# -------------------------------------------------
jobs:

  # =================================================
  # 1. Register dataset
  # =================================================
  register-dataset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install huggingface_hub pandas

      - name: Upload dataset to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<EOF
          from huggingface_hub import HfApi
          import os

          api = HfApi()

          api.create_repo(
              repo_id=os.environ["DATASET_REPO"],
              repo_type="dataset",
              token=os.environ["HF_TOKEN"],
              exist_ok=True
          )

          api.upload_file(
              path_or_fileobj="tourism_project/data/tourism.csv",
              path_in_repo="tourism.csv",
              repo_id=os.environ["DATASET_REPO"],
              repo_type="dataset",
              token=os.environ["HF_TOKEN"]
          )

          print("✅ Dataset uploaded successfully")
          EOF


  # =================================================
  # 2. Data preparation
  # =================================================
  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pandas scikit-learn huggingface_hub

      - name: Prepare and upload train/test split
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<EOF
          import os
          import pandas as pd
          from sklearn.model_selection import train_test_split
          from huggingface_hub import hf_hub_download, HfApi

          token = os.environ["HF_TOKEN"]
          repo = os.environ["DATASET_REPO"]

          csv_path = hf_hub_download(
              repo_id=repo,
              filename="tourism.csv",
              repo_type="dataset",
              token=token
          )

          df = pd.read_csv(csv_path)

          X = df.drop("ProdTaken", axis=1)
          y = df["ProdTaken"]

          X_train, X_test, y_train, y_test = train_test_split(
              X, y, test_size=0.2, stratify=y, random_state=42
          )

          os.makedirs("split_data", exist_ok=True)
          X_train.to_csv("split_data/X_train.csv", index=False)
          X_test.to_csv("split_data/X_test.csv", index=False)
          y_train.to_csv("split_data/y_train.csv", index=False)
          y_test.to_csv("split_data/y_test.csv", index=False)

          api = HfApi()
          api.upload_folder(
              folder_path="split_data",
              path_in_repo="split_data",
              repo_id=repo,
              repo_type="dataset",
              token=token
          )

          print("✅ Data prep completed")
          EOF


  # =================================================
  # 3. Model training
  # =================================================
  model-training:
    needs: data-prep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pandas numpy scikit-learn joblib mlflow huggingface_hub xgboost

      - name: Train and register model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          DATASET_REPO: ${{ env.DATASET_REPO }}
          MODEL_REPO: ${{ env.MODEL_REPO }}
        run: |
          python tourism_project/model_building/train_and_register_models.py


  # =================================================
  # 4. Deploy Streamlit app to HF Space
  # =================================================
  deploy-hosting:
    needs: model-training
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Deploy to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python <<EOF
          from huggingface_hub import HfApi
          import os

          api = HfApi()

          api.create_repo(
              repo_id=os.environ["SPACE_REPO"],
              repo_type="space",
              space_sdk="docker",
              token=os.environ["HF_TOKEN"],
              exist_ok=True
          )

          api.upload_folder(
              folder_path="tourism_project/deployment",
              repo_id=os.environ["SPACE_REPO"],
              repo_type="space",
              token=os.environ["HF_TOKEN"]
          )

          print("✅ Streamlit Space deployed")
          EOF
