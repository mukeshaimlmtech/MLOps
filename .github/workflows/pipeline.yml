name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade huggingface_hub pandas

      - name: Register dataset on Hugging Face (debug-safe)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python <<EOF
          import os
          import sys
          from huggingface_hub import HfApi

          print("HF_USERNAME:", os.environ.get("HF_USERNAME"))
          print("File exists:", os.path.exists("tourism_project/data/tourism.csv"))

          api = HfApi(token=os.environ["HF_TOKEN"])

          # ✅ ENSURE correct repo name (NO trailing dot)
          api.create_repo(
              repo_id=f"{os.environ['HF_USERNAME']}/Wellness-Tourism-Dataset",
              repo_type="dataset",
              exist_ok=True
          )

          api.upload_file(
              path_or_fileobj="tourism_project/data/tourism.csv",
              path_in_repo="tourism.csv",
              repo_id=f"{os.environ['HF_USERNAME']}/Wellness-Tourism-Dataset",
              repo_type="dataset"
          )

          print("✅ Dataset uploaded successfully")
          EOF


  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn huggingface_hub

      - name: Run data preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/data_prep/data_prep.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn mlflow xgboost joblib huggingface_hub

      - name: Train model and register to HF Model Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/train_and_register_models.py
    
    
    deploy-hosting:
    runs-on: ubuntu-latest
    needs: [model-traning,data-prep,register-dataset]
    steps:
      - uses: actions/checkout@v3
      - name: Install Dependencies
        run: pip install -r mlops/requirements.txt
      - name: Push files to Frontend Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python mlops/hosting/hosting.py

