
name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install huggingface_hub pandas

      - name: Upload dataset to Hugging Face Dataset Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python - <<EOF
          from huggingface_hub import HfApi
          api = HfApi()
          api.upload_file(
              path_or_fileobj="tourism_project/data/tourism.csv",
              path_in_repo="tourism.csv",
              repo_id=f"{'$'}HF_USERNAME/Wellness-Tourism-Dataset",
              repo_type="dataset",
              token=f"{'$'}HF_TOKEN"
          )
          print("✅ Dataset uploaded successfully")
          EOF


  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn huggingface_hub

      - name: Run data preparation (split & upload)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/data_prep/data_prep.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn mlflow xgboost joblib huggingface_hub

      - name: Train model and register to Hugging Face Model Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/train_and_register_models.py
``
