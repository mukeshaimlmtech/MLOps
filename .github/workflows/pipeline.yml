name: Tourism Project Pipeline

on:
  push:
    branches:
      - main

jobs:

  register-dataset:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install huggingface_hub pandas

      - name: Register dataset on Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          python <<EOF
          import os
          from huggingface_hub import HfApi

          hf_token = os.environ["HF_TOKEN"]
          hf_username = os.environ["HF_USERNAME"]

          print("HF USER:", hf_username)
          print("File exists:", os.path.exists("tourism_project/data/tourism.csv"))

          api = HfApi(token=hf_token)

          # ✅ Ensure dataset repo exists (this is the key fix)
          api.create_repo(
              repo_id=f"{hf_username}/Wellness-Tourism-Dataset",
              repo_type="dataset",
              exist_ok=True
          )

          # ✅ Upload dataset
          api.upload_file(
              path_or_fileobj="tourism_project/data/tourism.csv",
              path_in_repo="tourism.csv",
              repo_id=f"{hf_username}/Wellness-Tourism-Dataset",
              repo_type="dataset"
          )

          print("✅ Dataset registered successfully")
          EOF


  data-prep:
    needs: register-dataset
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn huggingface_hub

      - name: Run data preparation
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/data_prep/data_prep.py


  model-training:
    needs: data-prep
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install pandas scikit-learn mlflow xgboost joblib huggingface_hub

      - name: Train model and register to HF Model Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python tourism_project/model_building/train_and_register_models.py
